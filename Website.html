<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SIM — Security Incident Mapping System</title>
<meta name="description" content="A modern campus security platform to report, track and resolve security incidents around the university."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* SIM - Security Incident Mapping System - single-file build */
:root{
  --brown:#4E342E;--brown-dark:#3b2723;--brown-light:#6d4c47;
  --gold:#F9A825;--gold-dark:#d68e11;--cream:#FFF8E1;--white:#ffffff;
  --text:#2b2b2b;--muted:#6b6b6b;--border:#eee3c7;
  --danger:#e53935;--success:#2e7d32;--info:#1976d2;--warning:#ef6c00;
  --shadow:0 8px 24px rgba(78,52,46,.08);--shadow-lg:0 16px 40px rgba(78,52,46,.15);
  --radius:14px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--cream);color:var(--text);line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:var(--brown);text-decoration:none}
a:hover{color:var(--gold-dark)}
img{max-width:100%;display:block}
h1,h2,h3,h4{font-family:'Poppins',Inter,sans-serif;color:var(--brown);font-weight:700;line-height:1.2}
h1{font-size:clamp(2rem,4vw,3rem)}
h2{font-size:clamp(1.5rem,3vw,2.2rem)}
h3{font-size:1.25rem}
.nav{position:sticky;top:0;z-index:50;background:rgba(255,248,225,.92);backdrop-filter:saturate(1.2) blur(10px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1200px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;color:var(--brown);font-size:1.25rem;font-family:'Poppins',sans-serif}
.logo-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--brown),var(--brown-light));display:grid;place-items:center;color:var(--gold);font-weight:900;box-shadow:var(--shadow)}
.nav-links{display:flex;gap:6px;align-items:center}
.nav-links a{padding:8px 14px;border-radius:8px;color:var(--brown);font-weight:500;transition:all .2s}
.nav-links a:hover,.nav-links a.active{background:var(--brown);color:var(--gold)}
.nav-cta{display:flex;gap:10px;align-items:center}
.burger{display:none;background:none;border:none;color:var(--brown);font-size:1.5rem;cursor:pointer}
.mobile-menu{position:fixed;inset:0;background:rgba(78,52,46,.95);z-index:100;display:none;flex-direction:column;padding:80px 30px;gap:8px}
.mobile-menu.open{display:flex;animation:fadeIn .25s ease}
.mobile-menu a{color:var(--cream);font-size:1.25rem;padding:14px;border-bottom:1px solid rgba(255,255,255,.1)}
.mobile-close{position:absolute;top:20px;right:20px;background:none;border:none;color:var(--gold);font-size:2rem;cursor:pointer}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;border-radius:10px;font-weight:600;cursor:pointer;border:none;font-family:inherit;font-size:.95rem;transition:transform .15s ease,box-shadow .2s,background .2s;text-decoration:none}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--brown);color:var(--gold)}
.btn-primary:hover{background:var(--brown-dark);box-shadow:var(--shadow)}
.btn-gold{background:var(--gold);color:var(--brown)}
.btn-gold:hover{background:var(--gold-dark);box-shadow:var(--shadow)}
.btn-outline{background:transparent;color:var(--brown);border:2px solid var(--brown)}
.btn-outline:hover{background:var(--brown);color:var(--gold)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#c62828}
.btn-sm{padding:8px 14px;font-size:.85rem}
.btn-block{width:100%}
.hero{max-width:1200px;margin:0 auto;padding:60px 20px 40px;display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center}
.hero .eyebrow{display:inline-block;background:rgba(249,168,37,.15);color:var(--gold-dark);padding:6px 14px;border-radius:999px;font-weight:600;font-size:.85rem;margin-bottom:16px}
.hero h1 span{color:var(--gold-dark)}
.hero p.lead{font-size:1.1rem;color:var(--muted);margin:16px 0 28px;max-width:520px}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap}
.hero-visual{background:linear-gradient(135deg,var(--brown),var(--brown-light));border-radius:24px;padding:40px;color:var(--gold);position:relative;overflow:hidden;box-shadow:var(--shadow-lg);min-height:340px;display:grid;place-items:center}
.hero-visual::before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle,rgba(249,168,37,.25),transparent 60%);animation:pulse 6s ease-in-out infinite}
.shield{width:180px;height:180px;border-radius:50%;background:rgba(249,168,37,.15);border:2px solid rgba(249,168,37,.4);display:grid;place-items:center;position:relative;z-index:1}
.shield svg{width:100px;height:100px}
section{padding:50px 20px}
.container{max-width:1200px;margin:0 auto}
.section-title{text-align:center;margin-bottom:36px}
.section-title p{color:var(--muted);margin-top:8px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.stat-card{background:var(--white);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border:1px solid var(--border);transition:transform .2s}
.stat-card:hover{transform:translateY(-4px)}
.stat-card .icon{width:48px;height:48px;border-radius:12px;background:var(--cream);display:grid;place-items:center;color:var(--brown);font-size:1.4rem;margin-bottom:12px}
.stat-card h3{font-size:2rem;color:var(--brown);margin-bottom:4px}
.stat-card .label{color:var(--muted);font-size:.9rem}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px}
.feature{background:var(--white);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);border:1px solid var(--border);transition:all .25s}
.feature:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg)}
.feature .icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:grid;place-items:center;color:var(--brown);font-size:1.5rem;margin-bottom:16px}
.feature h3{margin-bottom:8px}
.feature p{color:var(--muted);font-size:.95rem}
.grid{display:grid;gap:20px}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
.card{background:var(--white);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card h3{margin-bottom:8px}
.card .meta{color:var(--muted);font-size:.85rem;margin-bottom:10px}
.contact-card{display:flex;flex-direction:column;gap:8px}
.contact-card .phone{font-size:1.4rem;font-weight:700;color:var(--brown)}
.contact-card .actions{margin-top:12px}
footer{background:var(--brown);color:#ddd;padding:40px 20px 20px;margin-top:60px}
.footer-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr;gap:30px}
footer h4{color:var(--gold);margin-bottom:12px}
footer a{color:#ddd;display:block;padding:4px 0}
footer a:hover{color:var(--gold)}
.footer-bottom{max-width:1200px;margin:24px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.1);text-align:center;color:#bbb;font-size:.9rem}
.auth-wrap{min-height:calc(100vh - 80px);display:grid;place-items:center;padding:40px 20px}
.auth-card{background:var(--white);border-radius:20px;padding:36px;width:100%;max-width:440px;box-shadow:var(--shadow-lg);border:1px solid var(--border);animation:slideUp .4s ease}
.auth-card h2{margin-bottom:6px}
.auth-card .sub{color:var(--muted);margin-bottom:24px}
.auth-switch{text-align:center;margin-top:16px;font-size:.9rem;color:var(--muted)}
.auth-switch a{color:var(--gold-dark);font-weight:600}
.form-group{margin-bottom:16px}
label{display:block;font-weight:600;color:var(--brown);margin-bottom:6px;font-size:.9rem}
input,select,textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:1rem;background:var(--white);color:var(--text);transition:border .2s,box-shadow .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(249,168,37,.2)}
textarea{min-height:110px;resize:vertical}
.checkbox{display:flex;align-items:center;gap:10px;margin:12px 0;cursor:pointer}
.checkbox input{width:auto}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.error-text{color:var(--danger);font-size:.85rem;margin-top:4px}
.dash{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:var(--brown);color:var(--cream);padding:24px 16px;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar .logo{color:var(--gold);margin-bottom:28px;padding:0 8px}
.sidebar nav a{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;color:#e8e0c9;margin-bottom:4px;font-weight:500;transition:all .2s}
.sidebar nav a:hover{background:rgba(249,168,37,.12);color:var(--gold)}
.sidebar nav a.active{background:var(--gold);color:var(--brown)}
.sidebar .sep{height:1px;background:rgba(255,255,255,.1);margin:16px 8px}
.main{padding:28px;background:var(--cream);min-height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.topbar h1{font-size:1.6rem}
.user-chip{display:flex;align-items:center;gap:10px;background:var(--white);padding:8px 14px;border-radius:999px;box-shadow:var(--shadow)}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:grid;place-items:center;color:var(--brown);font-weight:700}
.quick-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:20px}
.quick-action{background:var(--white);border:1px solid var(--border);padding:22px;border-radius:var(--radius);cursor:pointer;transition:all .2s;text-align:left;color:var(--brown);text-decoration:none;display:block}
.quick-action:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--gold)}
.quick-action .icon{font-size:1.6rem;margin-bottom:10px}
.quick-action h4{color:var(--brown);margin-bottom:4px}
.quick-action p{color:var(--muted);font-size:.85rem}
.table-wrap{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border)}
.table-toolbar{padding:16px;display:flex;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.table-toolbar input,.table-toolbar select{max-width:260px}
table{width:100%;border-collapse:collapse}
th,td{padding:14px 16px;text-align:left;font-size:.92rem}
th{background:var(--cream);color:var(--brown);font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.5px}
tbody tr{border-top:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:#fffdf3}
.table-empty{padding:40px;text-align:center;color:var(--muted)}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge-pending{background:#fff3e0;color:var(--warning)}
.badge-investigation{background:#e3f2fd;color:var(--info)}
.badge-resolved{background:#e8f5e9;color:var(--success)}
.badge-rejected{background:#ffebee;color:var(--danger)}
.badge-priority-low{background:#e8f5e9;color:var(--success)}
.badge-priority-medium{background:#fff3e0;color:var(--warning)}
.badge-priority-high{background:#ffebee;color:var(--danger)}
.badge-priority-critical{background:var(--danger);color:#fff}
.toast-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--white);border-left:4px solid var(--gold);padding:14px 18px;border-radius:10px;box-shadow:var(--shadow-lg);min-width:260px;animation:slideInR .3s ease;font-weight:500}
.toast.success{border-color:var(--success)}
.toast.error{border-color:var(--danger)}
.toast.info{border-color:var(--info)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:16px;padding:28px;width:100%;max-width:520px;box-shadow:var(--shadow-lg);animation:slideUp .3s}
.modal h3{margin-bottom:8px}
.modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInR{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.1);opacity:.8}}
.mt-2{margin-top:12px}.mt-3{margin-top:20px}.mt-4{margin-top:30px}
.text-center{text-align:center}
.flex{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.hidden{display:none!important}
@media (max-width:900px){
  .hero{grid-template-columns:1fr;padding-top:30px}
  .hero-visual{min-height:260px}
  .footer-inner{grid-template-columns:1fr}
  .dash{grid-template-columns:1fr}
  .sidebar{position:fixed;left:-280px;top:0;width:260px;z-index:150;transition:left .3s;height:100vh}
  .sidebar.open{left:0}
  .sidebar-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:140;display:none}
  .sidebar-backdrop.open{display:block}
  .main{padding:20px 16px}
  .menu-btn{display:inline-flex}
}
@media (max-width:700px){
  .nav-links{display:none}
  .burger{display:block}
  .form-row{grid-template-columns:1fr}
}
.menu-btn{display:none;background:var(--brown);color:var(--gold);border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:1.2rem}
</style>
</head>

<template id="tpl-register">
<header class="nav"><div class="nav-inner">
  <a class="logo" href="#/"><span class="logo-mark">S</span> SIM</a>
  <nav class="nav-links"><a href="#/">Home</a><a href="#/login">Login</a><a href="#/about">About</a></nav>
  <div class="nav-cta"><button class="burger">☰</button></div>
</div></header>
<div class="mobile-menu"><button class="mobile-close">×</button><a href="#/">Home</a><a href="#/login">Login</a></div>
<div class="auth-wrap"><div class="auth-card">
  <h2>Create your account</h2><p class="sub">Join SIM to report and track campus incidents.</p>
  <form id="register-form" novalidate>

<script>
(function(){
  'use strict';
  const KEYS={users:'sim_users',session:'sim_session',reports:'sim_reports',updates:'sim_updates',contacts:'sim_contacts'};
  const load=(k,f)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):f}catch(e){return f}};
  const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
  const uid=()=>'id_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);
  const reportId=()=>'SIM-'+Date.now().toString(36).toUpperCase().slice(-6)+'-'+Math.random().toString(36).slice(2,5).toUpperCase();
  const escapeHtml=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const setText=(sel,val)=>{const el=document.querySelector(sel);if(el)el.textContent=val};

  function seed(){
    if(!load(KEYS.contacts,null)) save(KEYS.contacts,[
      {id:uid(),name:'Campus Security',phone:'080-1000-1111',desc:'24/7 university security operations center.'},
      {id:uid(),name:'Police Emergency',phone:'112',desc:'National police emergency response line.'},
      {id:uid(),name:'Ambulance',phone:'199',desc:'Medical emergencies and ambulance dispatch.'},
      {id:uid(),name:'Fire Service',phone:'193',desc:'Fire outbreaks and rescue operations.'},
      {id:uid(),name:'Student Affairs',phone:'080-2000-3333',desc:'Student welfare and support services.'}
    ]);
    if(!load(KEYS.updates,null)) save(KEYS.updates,[
      {id:uid(),title:'Increased Patrols This Weekend',body:'Security patrols around hostels will be doubled between 8pm and 4am this weekend.',date:new Date().toISOString()},
      {id:uid(),title:'Beware of Phone Snatching Near Gate 3',body:'Multiple reports of phone snatching. Avoid using phones openly while walking near Gate 3.',date:new Date(Date.now()-86400000).toISOString()},
      {id:uid(),title:'New Emergency Whistle Points',body:'Emergency whistle stations have been installed around all female hostels.',date:new Date(Date.now()-3*86400000).toISOString()}
    ]);
    if(!load(KEYS.users,null)) save(KEYS.users,[]);
    if(!load(KEYS.reports,null)) save(KEYS.reports,[]);
  }

  const Session={
    get(){return load(KEYS.session,null)},
    set(s){save(KEYS.session,s)},
    clear(){localStorage.removeItem(KEYS.session)},
    requireUser(){const s=this.get();if(!s||s.role==='admin'){nav('login');return null}return s},
    requireAdmin(){const s=this.get();if(!s||s.role!=='admin'){nav('admin-login');return null}return s}
  };

  function toast(msg,type='info'){
    let wrap=document.querySelector('.toast-wrap');
    if(!wrap){wrap=document.createElement('div');wrap.className='toast-wrap';document.body.appendChild(wrap)}
    const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;wrap.appendChild(t);
    setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(20px)';t.style.transition='all .3s'},2600);
    setTimeout(()=>t.remove(),3000);
  }
  function confirmModal(title,text){
    return new Promise(resolve=>{
      const o=document.createElement('div');o.className='modal-overlay open';
      o.innerHTML=`<div class="modal"><h3>${title}</h3><p>${text}</p>
        <div class="actions"><button class="btn btn-outline" data-a="cancel">Cancel</button><button class="btn btn-danger" data-a="ok">Confirm</button></div></div>`;
      document.body.appendChild(o);
      o.addEventListener('click',e=>{
        if(e.target===o||e.target.dataset.a==='cancel'){o.remove();resolve(false)}
        else if(e.target.dataset.a==='ok'){o.remove();resolve(true)}
      });
    });
  }

  function nav(page){location.hash='#/'+(page==='landing'?'':page)}

  function initPublicNav(){
    const burger=document.querySelector('.burger');
    const menu=document.querySelector('.mobile-menu');
    if(burger&&menu){
      burger.addEventListener('click',()=>menu.classList.add('open'));
      menu.querySelector('.mobile-close')?.addEventListener('click',()=>menu.classList.remove('open'));
      menu.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>menu.classList.remove('open')));
    }
  }
  function initSidebar(){
    const sb=document.querySelector('.sidebar'),btn=document.querySelector('.menu-btn');
    if(!sb||!btn) return;
    const bd=document.createElement('div');bd.className='sidebar-backdrop';document.body.appendChild(bd);
    btn.addEventListener('click',()=>{sb.classList.add('open');bd.classList.add('open')});
    bd.addEventListener('click',()=>{sb.classList.remove('open');bd.classList.remove('open')});
  }
  function initLogout(){
    document.querySelectorAll('[data-logout]').forEach(a=>{
      a.addEventListener('click',e=>{e.preventDefault();Session.clear();toast('Signed out','info');setTimeout(()=>nav('landing'),400)});
    });
  }

  function initLanding(){
    const yr=document.getElementById('yr');if(yr)yr.textContent=new Date().getFullYear();
    const users=load(KEYS.users,[]),reports=load(KEYS.reports,[]);
    const resolved=reports.filter(r=>r.status==='Resolved').length;
    setText('#stat-users',users.length||'250+');
    setText('#stat-reports',reports.length||'1,200+');
    setText('#stat-resolved',resolved||'980+');
    setText('#stat-response','< 5 min');
    const updates=load(KEYS.updates,[]).slice(0,3);
    const wrap=document.querySelector('#updates-preview');
    if(wrap) wrap.innerHTML=updates.map(u=>`<div class="card"><div class="meta">${new Date(u.date).toLocaleDateString()}</div><h3>${escapeHtml(u.title)}</h3><p>${escapeHtml(u.body).slice(0,120)}...</p></div>`).join('');
    const contacts=load(KEYS.contacts,[]).slice(0,3);
    const cwrap=document.querySelector('#contacts-preview');
    if(cwrap) cwrap.innerHTML=contacts.map(c=>`<div class="card contact-card"><h3>${escapeHtml(c.name)}</h3><div class="phone">${escapeHtml(c.phone)}</div><p>${escapeHtml(c.desc)}</p><div class="actions"><a class="btn btn-gold btn-sm" href="tel:${encodeURIComponent(c.phone)}">📞 Call</a></div></div>`).join('');
  }
  function initAbout(){document.querySelectorAll('.yr').forEach(el=>el.textContent=new Date().getFullYear())}

  function initRegister(){
    const f=document.querySelector('#register-form');if(!f)return;
    f.addEventListener('submit',e=>{
      e.preventDefault();
      const d=Object.fromEntries(new FormData(f).entries());
      if(!d.name||!d.email||!d.password) return toast('Please fill all required fields','error');
      if(d.password.length<6) return toast('Password must be at least 6 characters','error');
      if(d.password!==d.confirm) return toast('Passwords do not match','error');
      const users=load(KEYS.users,[]);
      if(users.some(u=>u.email.toLowerCase()===d.email.toLowerCase())) return toast('Email already registered','error');
      users.push({id:uid(),name:d.name,email:d.email,phone:d.phone,role:d.role,idNumber:d.idNumber||'',password:d.password,createdAt:new Date().toISOString()});
      save(KEYS.users,users); toast('Account created! Please log in','success');
      setTimeout(()=>nav('login'),700);
    });
  }
  function initLogin(){
    const f=document.querySelector('#login-form');if(!f)return;
    f.addEventListener('submit',e=>{
      e.preventDefault();
      const {email,password}=Object.fromEntries(new FormData(f).entries());
      const users=load(KEYS.users,[]);
      const user=users.find(u=>u.email.toLowerCase()===email.toLowerCase()&&u.password===password);
      if(!user) return toast('Invalid email or password','error');
      Session.set({id:user.id,email:user.email,name:user.name,role:'user',userRole:user.role});
      toast('Welcome back, '+user.name.split(' ')[0]+'!','success');
      setTimeout(()=>nav('dashboard'),600);
    });
  }
  function initAdminLogin(){
    const f=document.querySelector('#admin-login-form');if(!f)return;
    f.addEventListener('submit',e=>{
      e.preventDefault();
      const {username,password}=Object.fromEntries(new FormData(f).entries());
      if(username==='admin'&&password==='admin123'){
        Session.set({id:'admin',name:'Administrator',role:'admin'});
        toast('Admin access granted','success');
        setTimeout(()=>nav('admin'),500);
      } else toast('Invalid administrator credentials','error');
    });
  }

  function statusBadge(s){const map={'Pending Investigation':'pending','Under Investigation':'investigation','Resolved':'resolved','Rejected':'rejected'};return `<span class="badge badge-${map[s]||'pending'}">${s}</span>`}
  function priorityBadge(p){return `<span class="badge badge-priority-${(p||'low').toLowerCase()}">${p||'Low'}</span>`}

  function initUserDashboard(){
    const s=Session.requireUser();if(!s)return;
    document.querySelectorAll('[data-user-name]').forEach(el=>el.textContent=s.name);
    document.querySelectorAll('[data-user-initial]').forEach(el=>el.textContent=s.name.charAt(0).toUpperCase());
    const reports=load(KEYS.reports,[]).filter(r=>r.userId===s.id);
    setText('#u-total',reports.length);
    setText('#u-pending',reports.filter(r=>r.status==='Pending Investigation').length);
    setText('#u-invest',reports.filter(r=>r.status==='Under Investigation').length);
    setText('#u-resolved',reports.filter(r=>r.status==='Resolved').length);
    const rec=document.querySelector('#recent-reports');
    if(rec){
      const list=reports.slice().sort((a,b)=>b.createdAt.localeCompare(a.createdAt)).slice(0,5);
      rec.innerHTML=list.length?list.map(r=>`<tr><td><strong>${r.reportId}</strong></td><td>${escapeHtml(r.type)}</td><td>${escapeHtml(r.location)}</td><td>${statusBadge(r.status)}</td><td>${priorityBadge(r.priority)}</td></tr>`).join(''):`<tr><td colspan="5" class="table-empty">No reports yet. Submit your first report.</td></tr>`;
    }
  }
  function initReportForm(){
    const s=Session.requireUser();if(!s)return;
    const f=document.querySelector('#report-form');if(!f)return;
    const today=new Date();
    f.date.value=today.toISOString().slice(0,10);
    f.time.value=today.toTimeString().slice(0,5);
    f.addEventListener('submit',e=>{
      e.preventDefault();
      const d=Object.fromEntries(new FormData(f).entries());
      if(!d.type||!d.date||!d.time||!d.location||!d.description) return toast('Please fill all required fields','error');
      if(d.description.length<10) return toast('Please provide a more detailed description','error');
      const reports=load(KEYS.reports,[]);
      const rec={id:uid(),reportId:reportId(),userId:s.id,userName:d.anonymous?'Anonymous':s.name,anonymous:!!d.anonymous,type:d.type,date:d.date,time:d.time,location:d.location,description:d.description,priority:d.priority||'Medium',status:'Pending Investigation',notes:'',createdAt:new Date().toISOString()};
      reports.push(rec);save(KEYS.reports,reports);
      toast('Report submitted • '+rec.reportId,'success');
      setTimeout(()=>nav('my-reports'),700);
    });
  }
  function initMyReports(){
    const s=Session.requireUser();if(!s)return;
    const tbody=document.querySelector('#my-reports-body');if(!tbody)return;
    const search=document.querySelector('#mr-search'),filter=document.querySelector('#mr-filter'),sort=document.querySelector('#mr-sort');
    function render(){
      let list=load(KEYS.reports,[]).filter(r=>r.userId===s.id);
      const q=(search?.value||'').toLowerCase();
      if(q) list=list.filter(r=>r.reportId.toLowerCase().includes(q)||r.type.toLowerCase().includes(q)||r.location.toLowerCase().includes(q));
      const fs=filter?.value; if(fs&&fs!=='all') list=list.filter(r=>r.status===fs);
      const so=sort?.value||'newest';
      list.sort((a,b)=> so==='oldest'?a.createdAt.localeCompare(b.createdAt):b.createdAt.localeCompare(a.createdAt));
      tbody.innerHTML=list.length?list.map(r=>`<tr><td><strong>${r.reportId}</strong></td><td>${escapeHtml(r.type)}</td><td>${r.date}</td><td>${escapeHtml(r.location)}</td><td>${statusBadge(r.status)}</td><td>${priorityBadge(r.priority)}</td></tr>`).join(''):`<tr><td colspan="6" class="table-empty">No reports match your filters.</td></tr>`;
    }
    [search,filter,sort].forEach(el=>el&&el.addEventListener('input',render));
    render();
  }

  function initAdmin(){
    const s=Session.requireAdmin();if(!s)return;
    function refreshStats(){
      const users=load(KEYS.users,[]),reports=load(KEYS.reports,[]);
      setText('#a-users',users.length);setText('#a-reports',reports.length);
      setText('#a-pending',reports.filter(r=>r.status==='Pending Investigation').length);
      setText('#a-invest',reports.filter(r=>r.status==='Under Investigation').length);
      setText('#a-resolved',reports.filter(r=>r.status==='Resolved').length);
    }
    refreshStats();
    const rbody=document.querySelector('#admin-reports-body'),rSearch=document.querySelector('#ar-search'),rFilter=document.querySelector('#ar-filter');
    function renderReports(){
      let list=load(KEYS.reports,[]);
      const q=(rSearch?.value||'').toLowerCase();
      if(q) list=list.filter(r=>[r.reportId,r.type,r.location,r.userName].some(v=>String(v).toLowerCase().includes(q)));
      const fs=rFilter?.value; if(fs&&fs!=='all') list=list.filter(r=>r.status===fs);
      list.sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
      rbody.innerHTML=list.length?list.map(r=>`
        <tr>
          <td><strong>${r.reportId}</strong></td><td>${escapeHtml(r.type)}</td><td>${escapeHtml(r.userName)}</td>
          <td>${escapeHtml(r.location)}</td><td>${priorityBadge(r.priority)}</td>
          <td><select data-status="${r.id}">${['Pending Investigation','Under Investigation','Resolved','Rejected'].map(o=>`<option ${o===r.status?'selected':''}>${o}</option>`).join('')}</select></td>
          <td><button class="btn btn-sm btn-outline" data-notes="${r.id}">Notes</button> <button class="btn btn-sm btn-danger" data-del="${r.id}">Delete</button></td>
        </tr>`).join(''):`<tr><td colspan="7" class="table-empty">No reports found.</td></tr>`;
    }
    if(rbody){
      [rSearch,rFilter].forEach(el=>el&&el.addEventListener('input',renderReports));
      rbody.addEventListener('change',e=>{
        const id=e.target.dataset.status;if(!id)return;
        const list=load(KEYS.reports,[]);const r=list.find(x=>x.id===id);if(!r)return;
        r.status=e.target.value;save(KEYS.reports,list);toast('Status updated','success');refreshStats();
      });
      rbody.addEventListener('click',async e=>{
        const del=e.target.dataset.del,nid=e.target.dataset.notes;
        if(del){
          if(!await confirmModal('Delete report','This will permanently remove the report.')) return;
          save(KEYS.reports,load(KEYS.reports,[]).filter(r=>r.id!==del));
          toast('Report deleted','info');renderReports();refreshStats();
        } else if(nid){
          const list=load(KEYS.reports,[]);const r=list.find(x=>x.id===nid);
          const notes=prompt('Investigation notes:',r.notes||'');
          if(notes!==null){r.notes=notes;save(KEYS.reports,list);toast('Notes saved','success')}
        }
      });
      renderReports();
    }
    const ubody=document.querySelector('#admin-users-body');
    function renderUsers(){
      const list=load(KEYS.users,[]);
      ubody.innerHTML=list.length?list.map(u=>`<tr><td>${escapeHtml(u.name)}</td><td>${escapeHtml(u.email)}</td><td>${escapeHtml(u.role)}</td><td>${escapeHtml(u.phone||'-')}</td><td><button class="btn btn-sm btn-danger" data-udel="${u.id}">Remove</button></td></tr>`).join(''):`<tr><td colspan="5" class="table-empty">No users registered.</td></tr>`;
    }
    if(ubody){
      ubody.addEventListener('click',async e=>{
        const id=e.target.dataset.udel;if(!id)return;
        if(!await confirmModal('Remove user','This will delete the user account.')) return;
        save(KEYS.users,load(KEYS.users,[]).filter(u=>u.id!==id));
        toast('User removed','info');renderUsers();refreshStats();
      });
      renderUsers();
    }
    const aList=document.querySelector('#admin-updates'),aForm=document.querySelector('#update-form');
    function renderU(){
      const list=load(KEYS.updates,[]);
      aList.innerHTML=list.length?list.map(u=>`<div class="card"><div class="flex-between"><div><h3>${escapeHtml(u.title)}</h3><div class="meta">${new Date(u.date).toLocaleString()}</div></div><div class="flex"><button class="btn btn-sm btn-outline" data-uedit="${u.id}">Edit</button><button class="btn btn-sm btn-danger" data-udelete="${u.id}">Delete</button></div></div><p class="mt-2">${escapeHtml(u.body)}</p></div>`).join(''):'<div class="card"><p>No announcements yet.</p></div>';
    }
    if(aList){
      aForm?.addEventListener('submit',e=>{
        e.preventDefault();
        const d=Object.fromEntries(new FormData(aForm).entries());
        if(!d.title||!d.body) return toast('Fill in title and body','error');
        const list=load(KEYS.updates,[]);
        list.unshift({id:uid(),title:d.title,body:d.body,date:new Date().toISOString()});
        save(KEYS.updates,list);aForm.reset();toast('Announcement posted','success');renderU();
      });
      aList.addEventListener('click',async e=>{
        const del=e.target.dataset.udelete,edit=e.target.dataset.uedit;
        if(del){
          if(!await confirmModal('Delete announcement','This action cannot be undone.')) return;
          save(KEYS.updates,load(KEYS.updates,[]).filter(u=>u.id!==del));toast('Deleted','info');renderU();
        } else if(edit){
          const list=load(KEYS.updates,[]);const u=list.find(x=>x.id===edit);
          const t=prompt('Title',u.title);if(t===null)return;
          const b=prompt('Body',u.body);if(b===null)return;
          u.title=t;u.body=b;save(KEYS.updates,list);toast('Updated','success');renderU();
        }
      });
      renderU();
    }
    const cList=document.querySelector('#admin-contacts'),cForm=document.querySelector('#contact-form');
    function renderC(){
      const list=load(KEYS.contacts,[]);
      cList.innerHTML=list.map(c=>`<div class="card contact-card"><div class="flex-between"><h3>${escapeHtml(c.name)}</h3><button class="btn btn-sm btn-danger" data-cdel="${c.id}">Delete</button></div><div class="phone">${escapeHtml(c.phone)}</div><p>${escapeHtml(c.desc)}</p></div>`).join('');
    }
    if(cList){
      cForm?.addEventListener('submit',e=>{
        e.preventDefault();
        const d=Object.fromEntries(new FormData(cForm).entries());
        if(!d.name||!d.phone) return toast('Name and phone are required','error');
        const list=load(KEYS.contacts,[]);
        list.push({id:uid(),name:d.name,phone:d.phone,desc:d.desc||''});
        save(KEYS.contacts,list);cForm.reset();toast('Contact added','success');renderC();
      });
      cList.addEventListener('click',async e=>{
        const id=e.target.dataset.cdel;if(!id)return;
        if(!await confirmModal('Delete contact','Remove this emergency contact?')) return;
        save(KEYS.contacts,load(KEYS.contacts,[]).filter(c=>c.id!==id));toast('Deleted','info');renderC();
      });
      renderC();
    }
  }

  function initUpdatesPage(){
    const wrap=document.querySelector('#updates-list');if(!wrap)return;
    const list=load(KEYS.updates,[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
    wrap.innerHTML=list.length?list.map(u=>`<div class="card"><div class="meta">${new Date(u.date).toLocaleString()}</div><h3>${escapeHtml(u.title)}</h3><p class="mt-2">${escapeHtml(u.body)}</p></div>`).join(''):'<div class="card"><p>No announcements yet.</p></div>';
  }
  function initContactsPage(){
    const wrap=document.querySelector('#contacts-list');if(!wrap)return;
    const list=load(KEYS.contacts,[]);
    wrap.innerHTML=list.map(c=>`<div class="card contact-card"><h3>${escapeHtml(c.name)}</h3><div class="phone">${escapeHtml(c.phone)}</div><p>${escapeHtml(c.desc)}</p><div class="actions"><a class="btn btn-gold" href="tel:${encodeURIComponent(c.phone)}">📞 Call Now</a></div></div>`).join('');
  }
  function initProfile(){
    const s=Session.requireUser();if(!s)return;
    const users=load(KEYS.users,[]);const u=users.find(x=>x.id===s.id);if(!u)return;
    const f=document.querySelector('#profile-form');
    if(f){
      f.name.value=u.name;f.email.value=u.email;f.phone.value=u.phone||'';f.role.value=u.role;
      f.addEventListener('submit',e=>{
        e.preventDefault();
        const d=Object.fromEntries(new FormData(f).entries());
        u.name=d.name;u.phone=d.phone;save(KEYS.users,users);
        Session.set({...s,name:u.name});toast('Profile updated','success');
      });
    }
    const pf=document.querySelector('#password-form');
    if(pf){
      pf.addEventListener('submit',e=>{
        e.preventDefault();
        const d=Object.fromEntries(new FormData(pf).entries());
        if(d.current!==u.password) return toast('Current password is incorrect','error');
        if(d.next.length<6) return toast('Password must be at least 6 characters','error');
        if(d.next!==d.confirm) return toast('Passwords do not match','error');
        u.password=d.next;save(KEYS.users,users);pf.reset();toast('Password changed','success');
      });
    }
    const det=document.querySelector('#account-details');
    if(det) det.innerHTML=`<div class="flex-between"><span>Role</span><strong>${escapeHtml(u.role)}</strong></div><div class="flex-between mt-2"><span>ID Number</span><strong>${escapeHtml(u.idNumber||'-')}</strong></div><div class="flex-between mt-2"><span>Joined</span><strong>${new Date(u.createdAt).toLocaleDateString()}</strong></div>`;
  }

  const ROUTES={
    '':'landing','landing':'landing',
    'login':'login','register':'register','admin-login':'admin-login',
    'about':'about','updates':'updates','contacts':'contacts',
    'dashboard':'dashboard','report':'report','my-reports':'my-reports','profile':'profile',
    'admin':'admin'
  };
  const INITS={
    landing:initLanding,about:initAbout,login:initLogin,register:initRegister,
    'admin-login':initAdminLogin,updates:initUpdatesPage,contacts:initContactsPage,
    dashboard:initUserDashboard,report:initReportForm,'my-reports':initMyReports,
    profile:initProfile,admin:initAdmin
  };

  function render(){
    const raw=(location.hash||'').replace(/^#\/?/,'');
    const key=raw.split('?')[0];
    const page=ROUTES[key]||'landing';
    const tmpl=document.getElementById('tpl-'+page);
    const app=document.getElementById('app');
    app.innerHTML='';
    if(tmpl) app.appendChild(tmpl.content.cloneNode(true));
    document.body.dataset.page=page;
    initPublicNav();initSidebar();initLogout();
    try{INITS[page]&&INITS[page]()}catch(err){console.error(err)}
    window.scrollTo(0,0);
  }
  window.addEventListener('hashchange',render);
  document.addEventListener('DOMContentLoaded',()=>{seed();render()});
})();
</script>
</body>
</html>
